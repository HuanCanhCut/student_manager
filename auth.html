<!doctype html>

<html class="light" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Đăng nhập - Midnight Academy</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100;200;300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#334155",
              "secondary-fixed-dim": "#e2e8f0",
              "primary-fixed": "#dbeafe",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#e2e8f0",
              "primary-fixed-dim": "#bfdbfe",
              primary: "#137fec",
              "secondary-fixed": "#f1f5f9",
              "on-primary-container": "#1e40af",
              "on-tertiary-container": "#9a3412",
              "on-tertiary": "#ffffff",
              "tertiary-fixed-dim": "#fed7aa",
              "secondary-container": "#f1f5f9",
              "on-surface-variant": "#475569",
              "on-secondary-fixed": "#0f172a",
              "on-error": "#ffffff",
              "tertiary-fixed": "#ffedd5",
              "on-tertiary-fixed": "#431407",
              "surface-container": "#f1f5f9",
              "surface-container-low": "#f8fafc",
              "on-tertiary-fixed-variant": "#c2410c",
              "on-primary": "#ffffff",
              tertiary: "#ea580c",
              "error-container": "#fee2e2",
              background: "#f6f7f8",
              "surface-bright": "#ffffff",
              "primary-container": "#dbeafe",
              "inverse-surface": "#1e293b",
              surface: "#ffffff",
              "surface-container-highest": "#cbd5e1",
              "outline-variant": "#cbd5e1",
              "inverse-primary": "#93c5fd",
              "inverse-on-surface": "#f1f5f9",
              "on-background": "#0f172a",
              secondary: "#475569",
              "on-primary-fixed": "#1e3a8a",
              "on-secondary": "#ffffff",
              "on-error-container": "#991b1b",
              "surface-variant": "#f1f5f9",
              "surface-tint": "#137fec",
              outline: "#e2e8f0",
              "on-surface": "#0f172a",
              error: "#ef4444",
              "surface-dim": "#f6f7f8",
              "on-primary-fixed-variant": "#1d4ed8",
              "tertiary-container": "#ffedd5",
              "on-secondary-container": "#334155",
            },
            fontFamily: {
              headline: ["Lexend"],
              body: ["Lexend"],
              label: ["Lexend"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        vertical-align: middle;
      }
      body {
        font-family: "Lexend", sans-serif;
      }
    </style>
  </head>
  <body class="bg-background min-h-screen flex flex-col items-center">
    <!-- Header Section (Suppressed Shell for focused task, but following user content prompt) -->
    <header
      class="w-full max-w-7xl px-6 py-8 flex items-center justify-between"
    >
      <div class="flex items-center gap-3 group">
        <div
          class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-md"
        >
          <span
            class="material-symbols-outlined text-white"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >school</span
          >
        </div>
        <div class="flex flex-col">
          <span
            class="text-xl font-extrabold tracking-tighter text-on-background leading-none"
            >Midnight Academy</span
          >
          <span
            class="text-[11px] font-bold uppercase tracking-widest text-primary mt-1"
            >Hệ thống Giáo vụ</span
          >
        </div>
      </div>
    </header>
    <main class="flex-grow flex items-center justify-center px-6 w-full -mt-12">
      <div class="w-full max-w-md">
        <!-- Login Card -->
        <div
          class="bg-surface rounded-xl shadow-xl border border-outline/50 overflow-hidden relative"
        >
          <!-- Decorative Top Accent -->
          <div class="absolute top-0 left-0 w-full h-1.5 bg-primary"></div>
          <div class="p-8 md:p-10">
            <!-- Heading -->
            <div class="text-center mb-8">
              <h1
                class="text-3xl font-extrabold text-on-surface tracking-tight mb-2"
              >
                Đăng nhập hệ thống
              </h1>
              <p class="text-on-surface-variant text-sm font-medium">
                Vui lòng đăng nhập để quản lý thông tin trường học
              </p>
            </div>
            <form id="login-form" class="space-y-6">
              <!-- Email Field -->
              <div class="space-y-2">
                <label
                  class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant ml-1"
                  >Email / Tên đăng nhập</label
                >
                <div class="relative group">
                  <div
                    class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors"
                  >
                    <span class="material-symbols-outlined text-[20px]"
                      >person</span
                    >
                  </div>
                  <input
                    id="login-email"
                    class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white transition-all text-sm font-medium text-on-surface outline-none"
                    placeholder="admin@midnight.edu.vn"
                    type="text"
                    required
                  />
                </div>
              </div>
              <!-- Password Field -->
              <div class="space-y-2">
                <label
                  class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant ml-1"
                  >Mật khẩu</label
                >
                <div class="relative group">
                  <div
                    class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors"
                  >
                    <span class="material-symbols-outlined text-[20px]"
                      >lock</span
                    >
                  </div>
                  <input
                    id="login-password"
                    class="block w-full pl-11 pr-12 py-3.5 bg-surface-container-low border-transparent rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white transition-all text-sm font-medium text-on-surface outline-none"
                    placeholder="••••••••"
                    type="password"
                    required
                  />
                  <button
                    id="toggle-password"
                    class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-primary transition-colors"
                    type="button"
                  >
                    <span class="material-symbols-outlined text-[20px]"
                      >visibility</span
                    >
                  </button>
                </div>
              </div>
              <!-- Actions Row -->
              <div class="flex items-center justify-between">
                <label
                  class="flex items-center gap-2 cursor-pointer select-none"
                >
                  <div class="relative flex items-center">
                    <input
                      class="peer h-5 w-5 rounded-lg border-outline-variant text-primary focus:ring-primary/20 cursor-pointer"
                      type="checkbox"
                    />
                  </div>
                  <span class="text-sm font-medium text-on-surface-variant"
                    >Ghi nhớ đăng nhập</span
                  >
                </label>
                <a
                  class="text-sm font-bold text-primary hover:underline transition-all"
                  href="#"
                  >Quên mật khẩu?</a
                >
              </div>
              <!-- Error Message -->
              <div
                id="login-error"
                class="hidden bg-error-container text-on-error-container text-sm font-medium px-4 py-3 rounded-xl flex items-center gap-2"
              >
                <span class="material-symbols-outlined text-[18px]">error</span>
                <span id="login-error-text"></span>
              </div>
              <!-- Submit Button -->
              <button
                id="login-submit"
                class="w-full bg-primary text-white py-4 rounded-xl font-bold text-base shadow-lg shadow-primary/25 hover:bg-primary/90 hover:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4"
                type="submit"
              >
                <span>Đăng nhập</span>
                <span class="material-symbols-outlined text-[20px]">login</span>
              </button>
            </form>
            
          </div>
        </div>
        
        </div>
      </div>
    </main>
    <!-- Footer Section -->
    <footer
      class="w-full py-8 mt-auto border-t border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-950"
    >
      <div
        class="max-w-7xl mx-auto px-12 flex flex-col md:flex-row justify-between items-center gap-4"
      >
        <span
          class="font-lexend text-[11px] uppercase tracking-widest font-bold text-slate-400 dark:text-slate-500"
        >
          © 2024 Midnight Academy. All rights reserved.
        </span>
        <div class="flex items-center gap-8">
          <a
            class="font-lexend text-[11px] uppercase tracking-widest font-bold text-slate-400 dark:text-slate-500 hover:text-blue-600 transition-colors"
            href="#"
            >Privacy Policy</a
          >
          <a
            class="font-lexend text-[11px] uppercase tracking-widest font-bold text-slate-400 dark:text-slate-500 hover:text-blue-600 transition-colors"
            href="#"
            >Terms of Service</a
          >
          <a
            class="font-lexend text-[11px] uppercase tracking-widest font-bold text-slate-400 dark:text-slate-500 hover:text-blue-600 transition-colors"
            href="#"
            >Help Center</a
          >
        </div>
      </div>
    </footer>

    <script src="api.js"></script>
    <script>
      (function () {
        const form = document.getElementById("login-form");
        const emailInput = document.getElementById("login-email");
        const passwordInput = document.getElementById("login-password");
        const errorBox = document.getElementById("login-error");
        const errorText = document.getElementById("login-error-text");
        const submitBtn = document.getElementById("login-submit");
        const togglePasswordBtn = document.getElementById("toggle-password");

        // Toggle password visibility
        togglePasswordBtn.addEventListener("click", () => {
          const isPassword = passwordInput.type === "password";
          passwordInput.type = isPassword ? "text" : "password";
          togglePasswordBtn.querySelector("span").textContent = isPassword
            ? "visibility_off"
            : "visibility";
        });

        function showError(message) {
          errorText.textContent = message;
          errorBox.classList.remove("hidden");
        }

        function hideError() {
          errorBox.classList.add("hidden");
        }

        function setLoading(loading) {
          submitBtn.disabled = loading;
          submitBtn.innerHTML = loading
            ? '<span class="material-symbols-outlined text-[20px] animate-spin">progress_activity</span> <span>Đang xử lý...</span>'
            : '<span>Đăng nhập</span> <span class="material-symbols-outlined text-[20px]">login</span>';
        }

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          hideError();

          const email = emailInput.value.trim();
          const password = passwordInput.value;

          if (!email || !password) {
            showError("Vui lòng nhập đầy đủ email và mật khẩu.");
            return;
          }

          setLoading(true);

          try {
            const result = await apiFetch("/auth/login", {
              method: "POST",
              body: JSON.stringify({ email, password }),
            });

            // Lưu token vào localStorage
            localStorage.setItem("access_token", result.meta.access_token);
            localStorage.setItem("refresh_token", result.meta.refresh_token);

            // Redirect tới trang chính
            window.location.href = "schedule.html";
          } catch (err) {
            const message =
              err.data?.message ||
              err.message ||
              "Đăng nhập thất bại. Vui lòng thử lại.";
            showError(message);
          } finally {
            setLoading(false);
          }
        });
      })();
    </script>
  </body>
</html>
